<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Rock, Paper, Scissors</title>
  <script src="rockpaperscissors.js" defer></script>
  <link rel="stylesheet" href="rockpaperscissors.css">
</head>

<body>
  <h1>Rock, Paper, Scissors</h1>
  <h2>Choose your weapon</h2>
  <h3>Score 5 first to win the game </h3>
  <div class = "round-container">
    <div class="player-container">
      <p>Player</p>
      <img id="playerPick" src="./images/Rock.svg" alt="Rock">
      <p id="playerScore">Player score: 0</p>
    </div>
    <div class="computer-container">
      <p>Computer</p>
      <img id="computerPick" src="./images/Rock.svg" alt="Rock">
      <p id="computerScore">Computer score: 0</p>
    </div>
  </div>
  <button class="hidden">Again?</button>
  <div class="img-container">
    <img class = "choice" id="rock" src="./images/Rock.svg" alt="Rock">
    <img class = "choice" id="paper" src="./images/Paper.svg" alt="Paper">
    <img class = "choice" id="scissors" src="./images/Scissors.svg" alt="Scissors">
  </div>
</body>

</html>
